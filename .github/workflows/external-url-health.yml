name: External URL health

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-url-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check external URLs
        run: node scripts/check-external-links.mjs --live --timeout=12000
