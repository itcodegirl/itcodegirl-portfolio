<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Page Not Found | Jenna Zawaski</title>
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
	<link rel="preload" href="assets/fonts/inter-latin-300-600.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="assets/fonts/playfair-display-latin-600-700.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="stylesheet" href="css/fonts.css">
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background:
				radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.22), transparent 32%),
				radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.18), transparent 30%),
				linear-gradient(135deg, #07070b 0%, #10101a 45%, #050509 100%);
			color: white;
			font-family: 'Inter', sans-serif;
			text-align: center;
			padding: 40px 24px;
		}
		.container { max-width: 480px; }
		.code {
			font-family: 'Playfair Display', serif;
			font-size: clamp(5rem, 20vw, 9rem);
			font-weight: 700;
			line-height: 1;
			background: linear-gradient(135deg, #c084fc, #818cf8);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			margin-bottom: 16px;
		}
		h1 {
			font-size: 1.4rem;
			font-weight: 500;
			color: rgba(255,255,255,0.8);
			margin-bottom: 12px;
		}
		p {
			color: rgba(255,255,255,0.5);
			line-height: 1.7;
			margin-bottom: 36px;
			font-size: 0.95rem;
		}
		a {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 13px 28px;
			border: 1px solid rgba(192, 132, 252, 0.45);
			border-radius: 10px;
			background: rgba(192, 132, 252, 0.08);
			color: #c084fc;
			text-decoration: none;
			font-weight: 500;
			font-size: 0.95rem;
			transition: background 0.2s ease, box-shadow 0.2s ease;
		}
		a:hover {
			background: rgba(192, 132, 252, 0.16);
			box-shadow: 0 0 24px rgba(192, 132, 252, 0.2);
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="code">404</div>
		<h1>Page not found</h1>
		<p>This page doesn't exist or may have moved.<br>Head back to the portfolio.</p>
		<a href="/">← Back to home</a>
	</div>
</body>
</html>
